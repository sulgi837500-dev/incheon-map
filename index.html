<html lang="ko">
<head>

    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.3/dist/leaflet.js"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.3/dist/leaflet.css"/>

    <style>
        /* 모바일 전체 화면 설정 */
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; font-family: 'Malgun Gothic', sans-serif; background: #f8f9fa; }
        #map { width: 100%; height: 65%; position: absolute; top: 0; z-index: 1; }

        /* 하단 안내창 모바일 최적화 */
        .info-container {
            position: absolute; bottom: 0; width: 100%; height: 35%;
            background: white; z-index: 2; border-radius: 20px 20px 0 0;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1); padding: 15px;
            display: flex; flex-direction: column;
        }

        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .header-row h6 { margin: 0; font-weight: bold; color: #333; font-size: 14px; }

        /* 테이블 스크롤 최적화 */
        .table-wrapper { flex: 1; overflow-x: auto; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; text-align: center; font-size: 11px; min-width: 500px; }
        th { background: #eee; padding: 6px; position: sticky; top: 0; z-index: 3; border: 1px solid #ddd; }
        td { padding: 8px; border: 1px solid #ddd; white-space: nowrap; }
        
        .clickable { color: #007bff; text-decoration: underline; font-weight: bold; cursor: pointer; }
        .disabled { color: #ccc; }

        /* 팝업 스타일 */
        .leaflet-popup-content-wrapper { border-radius: 12px; padding: 0; overflow: hidden; }
        .leaflet-popup-content { margin: 0; width: 250px !important; }
        .popup-header { color: white; padding: 10px; font-weight: bold; font-size: 14px; text-align: center; }
        .popup-body { padding: 12px; font-size: 13px; line-height: 1.5; }
        .popup-body a { color: #007bff; text-decoration: none; }
        
        .btn-reset { padding: 5px 12px; font-size: 12px; border-radius: 15px; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="info-container">
        <div class="header-row">
            <h6>📊 기관현황 (숫자 클릭 시 이동)</h6>
            <button onclick="resetView()" class="btn btn-dark btn-reset">전체보기</button>
        </div>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>구분</th><th>미추홀</th><th>영종</th><th>서구</th><th>검단</th><th>부평</th><th>계양</th><th>남동</th><th>연수</th><th>강화</th><th>기타</th>
                    </tr>
                </thead>
                <tbody id="statTable"></tbody>
            </table>
        </div>
        <div style="font-size: 10px; color: #666; margin-top: 8px; text-align: center;">
            📍 주소를 누르면 <b>네이버 지도</b>로 연결됩니다.
        </div>
    </div>

<script>
    var locations = [

        {"name": "햇살나무발달센터", "addr": "인천 서구 원당대로 676", "cat": "both", "lat": 37.593484, "lon": 126.676475, "dist": "검단구", "tel": "010-7579-8776", "rem": "신규"},
        {"name": "구래아동발달센터", "addr": "김포시 김포한강9로76번길 37", "cat": "both", "lat": 37.644352, "lon": 126.627384, "dist": "기타", "tel": "070-4012-7535", "rem": ""},

        {"name": "대교에듀캠프 드림멘토", "addr": "서울 강서구 공항대로 186", "cat": "border", "lat": 37.559258, "lon": 126.827994, "dist": "기타", "tel": "010-4042-9039", "rem": "찾아가는 교육 가능"},
        {"name": "해바람아동발달센터", "addr": "인천 동구 송현로 1", "cat": "border", "lat": 37.477203, "lon": 126.633378, "dist": "미추홀구", "tel": "032-777-6616", "rem": "찾아가는 교육 가능"},
        {"name": "검단라파언어심리센터", "addr": "인천 서구 검단로459번길 3-2", "cat": "border", "lat": 37.601762, "lon": 126.654738, "dist": "검단구", "tel": "032-565-7757", "rem": ""},
        {"name": "남동구아동복지종합센터", "addr": "인천 남동구 용천로 208", "cat": "border", "lat": 37.468553, "lon": 126.714038, "dist": "남동구", "tel": "032-421-6100", "rem": ""},
        {"name": "논현심리언어연구소", "addr": "인천 남동구 논고개로 123", "cat": "border", "lat": 37.401679, "lon": 126.722095, "dist": "남동구", "tel": "032-424-2752", "rem": ""},
        {"name": "새봄심리상담센터", "addr": "인천 부평구 부흥로294번길 4", "cat": "border", "lat": 37.498280, "lon": 126.724253, "dist": "부평구", "tel": "032-361-1368", "rem": "신규"},
        {"name": "온맘심리상담센터", "addr": "인천 강화군 강화대로216번길 53", "cat": "border", "lat": 37.745123, "lon": 126.504680, "dist": "강화군", "tel": "032-934-0356", "rem": ""},
        {"name": "이룸감각통합상담센터", "addr": "인천 남동구 논고개로123번길 17", "cat": "border", "lat": 37.401898, "lon": 126.723065, "dist": "남동구", "tel": "070-4105-2925", "rem": "신규"},
        {"name": "한솔아동발달(김포점)", "addr": "김포시 김포한강9로76번길 41", "cat": "border", "lat": 37.644641, "lon": 126.627298, "dist": "기타", "tel": "031-996-2282", "rem": "신규"},
        {"name": "365매일열린의원", "addr": "김포시 김포한강9로 109", "cat": "dyslexia", "lat": 37.646725, "lon": 126.625224, "dist": "기타", "tel": "031-981-7527", "rem": "신규"},
        {"name": "다올언어심리(부개점)", "addr": "인천 부평구 동수천로 132", "cat": "dyslexia", "lat": 37.497261, "lon": 126.737361, "dist": "부평구", "tel": "032-719-3856", "rem": ""},
        {"name": "언어심리상담 든든한벗", "addr": "부천시 길주로 280", "cat": "dyslexia", "lat": 37.503052, "lon": 126.773242, "dist": "기타", "tel": "032-321-4555", "rem": "신규"},
        {"name": "우리아이심리발달센터", "addr": "인천 부평구 부평문화로 28", "cat": "dyslexia", "lat": 37.493209, "lon": 126.720056, "dist": "부평구", "tel": "032-528-1477", "rem": "신규"},
        {"name": "이루언어심리(김포본점)", "addr": "김포시 유현로33번길 76", "cat": "dyslexia", "lat": 37.600292, "lon": 126.726150, "dist": "기타", "tel": "031-981-0426", "rem": "신규"},
        {"name": "다올언어심리(마곡점)", "addr": "서울 강서구 공항대로 186", "cat": "dyslexia", "lat": 37.5585, "lon": 126.8315, "dist": "기타", "tel": "010-4042-9039", "rem": "신규"}
    ];

    // 지도 초기화
    var map = L.map('map', { zoomControl: false }).setView([37.53, 126.65], 11);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    
    var markerGroup = L.featureGroup().addTo(map);

    function renderMarkers() {
        markerGroup.clearLayers();
        locations.forEach(function(loc) {
            var color = loc.cat === 'border' ? '#007bff' : (loc.cat === 'dyslexia' ? '#fd7e14' : '#dc3545');
            var marker = L.circleMarker([loc.lat, loc.lon], {
                radius: 9, fillColor: color, color: "#fff", weight: 2, opacity: 1, fillOpacity: 0.9
            }).addTo(markerGroup);

            // 네이버 지도 검색 URL 생성
            var naverMapUrl = "https://map.naver.com/v5/search/" + encodeURIComponent(loc.addr);

            marker.bindPopup(`
                <div class="popup-header" style="background:${color}">${loc.name}</div>
                <div class="popup-body">
                    <b>📍 주소:</b> <a href="${naverMapUrl}" target="_blank">${loc.addr}</a><br>
                    <b>📞 전화:</b> <a href="tel:${loc.tel}">${loc.tel}</a><br>
                    <hr style="margin:8px 0">
                    <small><b>참고:</b> ${loc.rem}</small>
                </div>
            `);
        });
    }

    function zoomToDistrict(cat, dist) {
        var filtered = locations.filter(d => d.cat === cat && d.dist === dist);
        if (filtered.length > 0) {
            var bounds = L.latLngBounds(filtered.map(d => [d.lat, d.lon]));
            map.fitBounds(bounds, { padding: [50, 50], maxZoom: 15 });
        }
    }

    function resetView() { map.setView([37.53, 126.65], 11); }

    function updateStats() {
        var districts = ["미추홀구", "영종구", "서구", "검단구", "부평구", "계양구", "남동구", "연수구", "강화군", "기타"];
        var categories = [{ id: "border", name: "경계선지능" }, { id: "dyslexia", name: "난독증" }, { id: "both", name: "복합(경계+난독)" }];
        var html = "";
        categories.forEach(cat => {
            html += `<tr><td style="background:#f9f9f9; font-weight:bold; text-align:left;">${cat.name}</td>`;
            districts.forEach(dist => {
                var count = locations.filter(l => l.cat === cat.id && l.dist === dist).length;
                html += count > 0 ? `<td class="clickable" onclick="zoomToDistrict('${cat.id}', '${dist}')">${count}</td>` : `<td class="disabled">0</td>`;
            });
            html += "</tr>";
        });
        document.getElementById("statTable").innerHTML = html;
    }

    renderMarkers();
    updateStats();
</script>
</body>
</html>
